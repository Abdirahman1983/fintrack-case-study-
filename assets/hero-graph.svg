<svg viewBox="0 0 520 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a completion rate climbing over time, drawn as a ledger-style line chart">
  <defs>
    <linearGradient id="fillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f6f4e" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2f6f4e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ledger ruling -->
  <g stroke="#10202f" stroke-opacity="0.08">
    <line x1="0" y1="40" x2="520" y2="40"/>
    <line x1="0" y1="100" x2="520" y2="100"/>
    <line x1="0" y1="160" x2="520" y2="160"/>
    <line x1="0" y1="220" x2="520" y2="220"/>
    <line x1="0" y1="280" x2="520" y2="280"/>
  </g>

  <!-- before line: flat, rust, dashed -->
  <path d="M10 250 C 90 246, 170 252, 250 248 S 420 250, 505 246"
        fill="none" stroke="#a8492f" stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round" opacity="0.75"/>

  <!-- after fill -->
  <path d="M10 250 C 100 210, 160 90, 260 62 C 350 40, 430 34, 505 30 L 505 300 L 10 300 Z"
        fill="url(#fillGrad)"/>

  <!-- after line: rising, green, solid -->
  <path d="M10 250 C 100 210, 160 90, 260 62 C 350 40, 430 34, 505 30"
        fill="none" stroke="#2f6f4e" stroke-width="3" stroke-linecap="round"/>

  <!-- markers -->
  <circle cx="10" cy="250" r="4" fill="#a8492f"/>
  <circle cx="505" cy="30" r="5" fill="#2f6f4e"/>

  <!-- labels -->
  <text x="14" y="272" font-family="IBM Plex Mono, monospace" font-size="12" fill="#a8492f">38%</text>
  <text x="466" y="24" font-family="IBM Plex Mono, monospace" font-size="12" fill="#2f6f4e">87%</text>
  <text x="14" y="24" font-family="IBM Plex Mono, monospace" font-size="11" fill="#5b6570" letter-spacing="1">ONBOARDING COMPLETION, WEEK 1 → WEEK 10</text>
</svg>
